<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}IA en 30 Segundos — Tutoriales rápidos de IA{{ else }}{{ .Title }} | IA30{{ end }}</title>
<meta name="description" content="{{ if .Params.description }}{{ .Params.description }}{{ else }}Tutoriales de Inteligencia Artificial en menos de 30 segundos. ChatGPT, Claude, Midjourney y herramientas IA gratuitas.{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
{{ if not .IsHome }}
<meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
{{ end }}

{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Params.description }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {"@type": "Person", "name": "IA30"},
  "publisher": {"@type": "Organization", "name": "IA30"},
  "mainEntityOfPage": {"@type": "WebPage", "@id": "{{ .Permalink }}"}
}
</script>
{{ end }}

<link rel="alternate" type="application/rss+xml" title="IA30 RSS" href="/index.xml">

<link rel="stylesheet" href="/css/style.css">
