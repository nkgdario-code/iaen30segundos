{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <time>{{ .Date.Format "2 de enero de 2006" }}</time>
      <span class="reading-time">{{ .ReadingTime }} min de lectura</span>
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>

  <footer class="post-footer">
    <h3>¿Te ha gustado?</h3>
    <p>Deja un comentario abajo y dime qué opinas.</p>
  </footer>

  <section class="newsletter-inline">
    <div class="newsletter-card">
      <h3>📩 ¿Quieres más tutoriales como este?</h3>
      <p>Suscríbete y recibe contenido nuevo cada semana.</p>
      <form class="newsletter-form" action="/api/subscribe" method="POST">
        <input type="email" name="email" placeholder="tu@email.com" required>
        <button type="submit">Suscribirme</button>
      </form>
    </div>
  </section>
</article>
{{ end }}
